<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cüzdan Asistanı | Gelir & Gider Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0c; color: #ededee; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  #root { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #0a0a0c; }
  .glass-card { background: #121216; border: 1px solid #1f1f24; border-radius: 28px; }
  .btn { cursor: pointer; transition: all 0.1s ease; font-weight: 600; border: none; background: none; }
  .btn:active { transform: scale(0.96); opacity: 0.8; }
  .slide-up { animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; background: #1e1e24; cursor: pointer; transition: 0.1s; border: none; color: #ddd; }
  .chip-active { background: #7c3aed; color: white; }
  .tx-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 24px; background: #121216; margin-bottom: 8px; transition: 0.1s; cursor: pointer; border: 1px solid #1f1f24; }
  .tx-row:active { background: #1a1a20; }
  .floating-btn { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: #7c3aed; box-shadow: 0 6px 14px rgba(124,58,237,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 30; border: none; color: white; }
  .floating-btn:active { transform: scale(0.92); }
  .input-field { width: 100%; background: #18181c; border-radius: 24px; padding: 14px 18px; color: #f0ede8; font-size: 15px; font-weight: 500; margin-bottom: 14px; border: 1px solid #2a2a30; }
  .input-field:focus { border-color: #7c3aed; outline: none; background: #202026; }
  .progress-bar { height: 6px; background: #2a2a30; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  .aud-badge { display: inline-flex; align-items: center; gap: 4px; background: #0f1a22; border: 1px solid #1e4a6e; border-radius: 8px; padding: 3px 8px; font-size: 10px; font-family: 'Space Mono', monospace; color: #5bc4f5; font-weight: 700; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; }
  .modal-card { background: #121216; border-radius: 32px 32px 0 0; width: 100%; padding: 28px 22px 38px; animation: slideUp 0.25s; max-height: 80vh; overflow-y: auto; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: #0c0c10; backdrop-filter: blur(12px); border-top: 1px solid #22222a; display: flex; justify-content: space-around; padding: 8px 20px 22px; z-index: 40; }
  .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: #8e8e98; font-weight: 600; cursor: pointer; }
  .nav-active { color: #c084fc; }
  .person-avatar { width: 48px; height: 48px; border-radius: 30px; background: #2a2a32; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
  select, input { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
// --- SABİTLER ---
const PEOPLE = ["Erdal", "A.A", "N.A"];

const INCOME_CATS = ["Maaş", "Freelance", "Hediye", "Yatırım", "Diğer"];
const EXPENSE_CATS = ["Alışveriş", "Fatura", "Ulaşım", "Eğlence", "Sağlık", "Kira", "Yemek", "Diğer"];

const formatTRY = (n) => {
  return new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n || 0);
};
const formatAUD = (n) => {
  return new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 2 }).format(n || 0);
};
const formatDateShort = (d) => {
  if (!d) return "";
  return new Date(d).toLocaleDateString("tr-TR", { day: "numeric", month: "short" });
};

// Örnek veri
const SAMPLE_TXS = [
  { id: 1, type: "income", person: "Erdal", amount: 15000, note: "Mart maaşı", category: "Maaş", date: "2026-03-01" },
  { id: 2, type: "expense", person: "Erdal", amount: 3500, note: "Kira", category: "Kira", date: "2026-03-03" },
  { id: 3, type: "expense", person: "A.A", amount: 850, note: "Market", category: "Alışveriş", date: "2026-03-05" },
  { id: 4, type: "income", person: "A.A", amount: 2200, note: "Freelance", category: "Freelance", date: "2026-03-07" },
  { id: 5, type: "expense", person: "N.A", amount: 320, note: "Ulaşım", category: "Ulaşım", date: "2026-03-08" },
  { id: 6, type: "income", person: "N.A", amount: 5000, note: "Maaş", category: "Maaş", date: "2026-03-09" },
  { id: 7, type: "expense", person: "Erdal", amount: 540, note: "Sinema", category: "Eğlence", date: "2026-03-12" },
];

// Ana Bileşen
const App = () => {
  const [txs, setTxs] = React.useState(() => {
    try {
      const saved = localStorage.getItem("wallet_data");
      return saved ? JSON.parse(saved) : SAMPLE_TXS;
    } catch { return SAMPLE_TXS; }
  });
  const [rate, setRate] = React.useState(0.032);
  const [rateLoading, setRateLoading] = React.useState(true);
  const [view, setView] = React.useState("home");
  const [selectedPerson, setSelectedPerson] = React.useState(null);
  const [editTarget, setEditTarget] = React.useState(null);
  const [detailModal, setDetailModal] = React.useState(null);
  const [filterType, setFilterType] = React.useState("all");
  const [filterPerson, setFilterPerson] = React.useState("all");
  const [filterCategory, setFilterCategory] = React.useState("all");
  const [monthViewKey, setMonthViewKey] = React.useState(null);
  const [personTxFilter, setPersonTxFilter] = React.useState("all");
  const [personSearch, setPersonSearch] = React.useState("");

  const blankForm = { type: "expense", person: "Erdal", amount: "", note: "", category: "Diğer", date: new Date().toISOString().split("T")[0] };
  const [form, setForm] = React.useState(blankForm);

  // LocalStorage'a kaydet
  React.useEffect(() => {
    localStorage.setItem("wallet_data", JSON.stringify(txs));
  }, [txs]);

  // Döviz kuru çek
  React.useEffect(() => {
    const fetchRate = async () => {
      try {
        const res = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD");
        const data = await res.json();
        if (data.rates?.AUD) setRate(data.rates.AUD);
      } catch (err) { console.warn("Kur çekilemedi"); }
      finally { setRateLoading(false); }
    };
    fetchRate();
  }, []);

  const toAUD = (n) => (n || 0) * rate;

  // Hesaplamalar
  const totalIncome = txs.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
  const totalExpense = txs.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const balance = totalIncome - totalExpense;

  const personStats = PEOPLE.map(p => {
    const inc = txs.filter(t => t.person === p && t.type === "income").reduce((s, t) => s + t.amount, 0);
    const exp = txs.filter(t => t.person === p && t.type === "expense").reduce((s, t) => s + t.amount, 0);
    return { name: p, income: inc, expense: exp, balance: inc - exp };
  });

  // Aylık gruplama
  const monthMap = {};
  txs.forEach(t => {
    if (!t.date) return;
    const d = new Date(t.date);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    if (!monthMap[key]) monthMap[key] = { inc: 0, exp: 0, label: d.toLocaleDateString("tr-TR", { month: "long", year: "numeric" }), transactions: [] };
    monthMap[key][t.type === "income" ? "inc" : "exp"] += t.amount;
    monthMap[key].transactions.push(t);
  });
  const monthKeys = Object.keys(monthMap).sort().reverse();

  // Ana ekran filtresi
  const filteredHome = txs.filter(t => {
    if (filterType !== "all" && t.type !== filterType) return false;
    if (filterPerson !== "all" && t.person !== filterPerson) return false;
    if (filterCategory !== "all" && t.category !== filterCategory) return false;
    return true;
  }).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 15);

  const openAdd = () => { setForm(blankForm); setEditTarget(null); setView("add"); };
  const openEdit = (tx) => { setForm({ ...tx, amount: String(tx.amount) }); setEditTarget(tx); setView("add"); setDetailModal(null); };
  const deleteTx = (id) => { setTxs(prev => prev.filter(t => t.id !== id)); setDetailModal(null); };
  const submitTx = () => {
    if (!form.amount || !form.person) return;
    const amountNum = parseFloat(form.amount);
    if (isNaN(amountNum)) return;
    const newTx = { ...form, amount: amountNum, id: editTarget ? editTarget.id : Date.now() };
    if (editTarget) setTxs(prev => prev.map(t => t.id === editTarget.id ? newTx : t));
    else setTxs(prev => [...prev, newTx]);
    setView("home"); setEditTarget(null); setForm(blankForm);
  };

  const goHome = () => { setView("home"); setSelectedPerson(null); setMonthViewKey(null); setFilterType("all"); setFilterPerson("all"); setFilterCategory("all"); setDetailModal(null); };

  const openPersonDetail = (name) => { setSelectedPerson(name); setPersonTxFilter("all"); setPersonSearch(""); setView("person"); };
  const openMonthDetail = (key) => { setMonthViewKey(key); setView("month"); };

  const currentMonthData = monthViewKey ? monthMap[monthViewKey] : null;
  const personTxs = selectedPerson ? txs.filter(t => t.person === selectedPerson && (personTxFilter === "all" || t.type === personTxFilter)).filter(t => personSearch === "" || (t.note || "").toLowerCase().includes(personSearch.toLowerCase())).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];

  // Satır bileşeni
  const TransactionRow = ({ tx, onClick }) => (
    <div className="tx-row" onClick={() => onClick(tx)}>
      <div style={{ display: "flex", gap: 12, alignItems: "center", flex: 1 }}>
        <div style={{ width: 42, height: 42, borderRadius: 30, background: tx.type === "income" ? "#0e2a1f" : "#2c1a1a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>
          {tx.type === "income" ? "📈" : "💸"}
        </div>
        <div>
          <div style={{ fontWeight: 700 }}>{tx.note || (tx.type === "income" ? "Gelir" : "Harcama")}</div>
          <div style={{ fontSize: 11, color: "#999", display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
            <span>{tx.person}</span>
            <span className="aud-badge" style={{ background: "#1f1f26" }}>{tx.category || "Genel"}</span>
            <span>{formatDateShort(tx.date)}</span>
          </div>
        </div>
      </div>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontWeight: 800, fontFamily: "'Space Mono', monospace", color: tx.type === "income" ? "#34d399" : "#f87171" }}>
          {tx.type === "income" ? `+${formatTRY(tx.amount)}` : `-${formatTRY(tx.amount)}`}
        </div>
        <div className="aud-badge" style={{ fontSize: 9, marginTop: 3 }}>🇦🇺 {formatAUD(toAUD(tx.amount))}</div>
      </div>
    </div>
  );

  return (
    <div style={{ paddingBottom: 90 }}>
      {/* Header */}
      <div style={{ padding: "20px 18px 10px" }}>
        {view !== "add" && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 10, fontWeight: 800, color: "#a78bfa", letterSpacing: 1 }}>BÜTÇE ASİSTANI</div>
              <div style={{ fontSize: 22, fontWeight: 800 }}>
                {view === "person" && selectedPerson ? `${selectedPerson} · Detay` : view === "month" ? "📅 Ay Özeti" : "Cüzdan"}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, background: "#15151c", padding: "5px 12px", borderRadius: 40 }}>
              <span>🇦🇺</span>
              <span style={{ fontFamily: "monospace", fontSize: 12 }}>{rateLoading ? "..." : `A$${rate.toFixed(5)}`}</span>
              <button className="btn" onClick={async () => { setRateLoading(true); try { const r = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD"); const d = await r.json(); if (d.rates?.AUD) setRate(d.rates.AUD); } catch(e) {} finally { setRateLoading(false); } }} style={{ fontSize: 12 }}>⟳</button>
            </div>
          </div>
        )}
      </div>

      {/* HOME */}
      {view === "home" && (
        <div className="slide-up" style={{ padding: "0 18px" }}>
          <div className="glass-card" style={{ padding: 20, marginBottom: 24, background: "linear-gradient(135deg, #17132a, #0f0f17)" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#c4b5fd" }}>TOPLAM BAKİYE</div>
            <div style={{ fontSize: 36, fontWeight: 800, fontFamily: "'Space Mono', monospace", color: balance >= 0 ? "#c4b5fd" : "#ff9f8f" }}>{formatTRY(balance)}</div>
            <div className="aud-badge" style={{ background: "#2a1e44", marginTop: 5 }}>🇦🇺 {formatAUD(toAUD(balance))}</div>
            <div style={{ display: "flex", gap: 20, marginTop: 16 }}>
              <div><div style={{ fontSize: 10, color: "#aaa" }}>GELİR</div><div style={{ fontWeight: 800, color: "#34d399" }}>{formatTRY(totalIncome)}</div><div className="aud-badge" style={{ marginTop: 2 }}>A$ {toAUD(totalIncome).toFixed(2)}</div></div>
              <div><div style={{ fontSize: 10, color: "#aaa" }}>GİDER</div><div style={{ fontWeight: 800, color: "#f87171" }}>{formatTRY(totalExpense)}</div><div className="aud-badge" style={{ marginTop: 2 }}>A$ {toAUD(totalExpense).toFixed(2)}</div></div>
            </div>
          </div>

          {/* Kişi Kartları */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>👥 Kişi Bazında</div>
            {personStats.map(p => {
              const saveRate = p.income > 0 ? Math.min(100, (p.balance / p.income) * 100) : 0;
              return (
                <div key={p.name} className="glass-card" style={{ padding: 14, marginBottom: 10, cursor: "pointer", borderRadius: 24 }} onClick={() => openPersonDetail(p.name)}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div><span style={{ fontWeight: 800 }}>{p.name}</span><div style={{ fontSize: 11, color: "#aaa" }}>tasarruf %{Math.round(saveRate)}</div></div>
                    <div style={{ textAlign: "right" }}><div style={{ fontWeight: 700 }}>{formatTRY(p.balance)}</div><div className="aud-badge">A$ {toAUD(p.balance).toFixed(2)}</div></div>
                  </div>
                  <div className="progress-bar" style={{ marginTop: 8 }}><div className="progress-fill" style={{ width: `${saveRate}%`, background: "#34d399" }} /></div>
                </div>
              );
            })}
          </div>

          {/* Filtreler */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            <select className="chip" value={filterType} onChange={e => setFilterType(e.target.value)}><option value="all">📌 Tümü</option><option value="income">💰 Gelir</option><option value="expense">💸 Gider</option></select>
            <select className="chip" value={filterPerson} onChange={e => setFilterPerson(e.target.value)}><option value="all">👤 Tüm kişiler</option>{PEOPLE.map(p => <option key={p}>{p}</option>)}</select>
            <select className="chip" value={filterCategory} onChange={e => setFilterCategory(e.target.value)}><option value="all">🏷️ Tüm kategoriler</option>{[...INCOME_CATS, ...EXPENSE_CATS].map(c => <option key={c}>{c}</option>)}</select>
          </div>

          <div style={{ fontWeight: 700, margin: "6px 0 8px" }}>📋 Son İşlemler</div>
          {filteredHome.map(tx => <TransactionRow key={tx.id} tx={tx} onClick={t => setDetailModal(t)} />)}
          {filteredHome.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#555" }}>İşlem yok. + ile ekleyin</div>}

          {/* Aylar */}
          <div style={{ marginTop: 24, marginBottom: 30 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📆 Aylık Özetler</div>
            <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8 }}>
              {monthKeys.map(key => {
                const m = monthMap[key];
                return (
                  <div key={key} className="glass-card" style={{ padding: "10px 16px", minWidth: 110, cursor: "pointer" }} onClick={() => openMonthDetail(key)}>
                    <div style={{ fontWeight: 800, fontSize: 13 }}>{m.label.split(" ")[0]}</div>
                    <div style={{ fontSize: 12 }}><span style={{ color: "#34d399" }}>{formatTRY(m.inc)}</span> / <span style={{ color: "#f87171" }}>{formatTRY(m.exp)}</span></div>
                    <div style={{ fontSize: 11, color: "#aaa" }}>{formatTRY(m.inc - m.exp)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* PERSON DETAY */}
      {view === "person" && selectedPerson && (
        <div className="slide-up" style={{ padding: "0 18px" }}>
          <button className="btn" onClick={goHome} style={{ background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 }}>← Ana Sayfa</button>
          <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 20 }}>
            <div className="person-avatar">{selectedPerson[0]}</div>
            <div><div style={{ fontWeight: 800, fontSize: 22 }}>{selectedPerson}</div><div style={{ color: "#34d399" }}>Net {formatTRY(personStats.find(p => p.name === selectedPerson)?.balance || 0)}</div></div>
          </div>
          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            <select className="chip" value={personTxFilter} onChange={e => setPersonTxFilter(e.target.value)}><option value="all">Tüm işlemler</option><option value="income">Gelirler</option><option value="expense">Giderler</option></select>
            <input className="input-field" style={{ padding: "8px 14px", margin: 0 }} placeholder="🔍 not ara" value={personSearch} onChange={e => setPersonSearch(e.target.value)} />
          </div>
          {personTxs.map(tx => <TransactionRow key={tx.id} tx={tx} onClick={t => setDetailModal(t)} />)}
          {personTxs.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#666" }}>Kayıt yok</div>}
          <button className="floating-btn" style={{ position: "relative", marginTop: 20, width: "100%", borderRadius: 60, background: "#7c3aed" }} onClick={() => { setForm({ ...blankForm, person: selectedPerson }); setEditTarget(null); setView("add"); }}>+ Yeni İşlem</button>
        </div>
      )}

      {/* MONTH VIEW */}
      {view === "month" && monthViewKey && currentMonthData && (
        <div className="slide-up" style={{ padding: "0 18px" }}>
          <button className="btn" onClick={goHome} style={{ background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 }}>← Geri</button>
          <div className="glass-card" style={{ padding: 20, textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 20, fontWeight: 800 }}>{currentMonthData.label}</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12 }}>
              <div><div>💰 Gelir</div><div style={{ fontWeight: 800, color: "#34d399" }}>{formatTRY(currentMonthData.inc)}</div></div>
              <div><div>💸 Gider</div><div style={{ fontWeight: 800, color: "#f87171" }}>{formatTRY(currentMonthData.exp)}</div></div>
              <div><div>📌 Net</div><div style={{ fontWeight: 800 }}>{formatTRY(currentMonthData.inc - currentMonthData.exp)}</div></div>
            </div>
          </div>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>📅 Ayın işlemleri</div>
          {currentMonthData.transactions.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx => <TransactionRow key={tx.id} tx={tx} onClick={t=>setDetailModal(t)} />)}
        </div>
      )}

      {/* ADD/EDIT FORM */}
      {view === "add" && (
        <div className="slide-up" style={{ padding: "0 18px" }}>
          <div className="glass-card" style={{ padding: 26 }}>
            <h3 style={{ marginBottom: 16 }}>{editTarget ? "✏️ Düzenle" : "➕ Yeni İşlem"}</h3>
            <select className="input-field" value={form.type} onChange={e => { const nt = e.target.value; setForm({ ...form, type: nt, category: nt === "income" ? "Maaş" : "Diğer" }); }}>
              <option value="income">💰 Gelir</option><option value="expense">💸 Gider</option>
            </select>
            <select className="input-field" value={form.person} onChange={e => setForm({ ...form, person: e.target.value })}>
              {PEOPLE.map(p => <option key={p}>{p}</option>)}
            </select>
            <input className="input-field" type="number" placeholder="₺ Tutar" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} />
            <select className="input-field" value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>
              {(form.type === "income" ? INCOME_CATS : EXPENSE_CATS).map(c => <option key={c}>{c}</option>)}
            </select>
            <input className="input-field" placeholder="Not" value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} />
            <input className="input-field" type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
            <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
              <button className="btn" onClick={submitTx} style={{ flex: 1, background: "#7c3aed", padding: 14, borderRadius: 60 }}>Kaydet</button>
              <button className="btn" onClick={goHome} style={{ flex: 1, background: "#2a2a32", padding: 14, borderRadius: 60 }}>İptal</button>
            </div>
          </div>
        </div>
      )}

      {/* DETAIL MODAL */}
      {detailModal && (
        <div className="modal-overlay" onClick={() => setDetailModal(null)}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 800, fontSize: 22 }}>{detailModal.type === "income" ? "Gelir Detayı" : "Gider Detayı"}</div>
            <div style={{ fontSize: 32, fontFamily: "monospace", fontWeight: 800, margin: "10px 0", color: detailModal.type === "income" ? "#34d399" : "#f87171" }}>{formatTRY(detailModal.amount)}</div>
            <div className="aud-badge" style={{ marginBottom: 14 }}>🇦🇺 {formatAUD(toAUD(detailModal.amount))}</div>
            <div style={{ background: "#1c1c24", borderRadius: 24, padding: 16, marginBottom: 20 }}>
              <div>👤 Kişi: {detailModal.person}</div>
              <div>📅 Tarih: {new Date(detailModal.date).toLocaleDateString("tr-TR")}</div>
              <div>🏷️ Kategori: {detailModal.category || "—"}</div>
              <div>📝 Not: {detailModal.note || "—"}</div>
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button className="btn" style={{ flex: 1, background: "#2c5f5f", padding: 12, borderRadius: 40 }} onClick={() => { openEdit(detailModal); setDetailModal(null); }}>✏️ Düzenle</button>
              <button className="btn" style={{ flex: 1, background: "#6b2e2e", padding: 12, borderRadius: 40 }} onClick={() => { if (confirm("Silinsin mi?")) deleteTx(detailModal.id); }}>🗑️ Sil</button>
              <button className="btn" style={{ background: "#2c2c36", padding: "12px 18px", borderRadius: 40 }} onClick={() => setDetailModal(null)}>Kapat</button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom Nav + FAB */}
      <div className="bottom-nav">
        <button className={`nav-btn ${view === "home" ? "nav-active" : ""}`} onClick={() => goHome()}><span style={{ fontSize: 22 }}>🏠</span><span>Ana Sayfa</span></button>
        <button className="nav-btn" onClick={() => { setView("add"); setEditTarget(null); setForm(blankForm); }}><span style={{ fontSize: 22 }}>➕</span><span>Ekle</span></button>
        <button className="nav-btn" onClick={() => { const data = localStorage.getItem("wallet_data"); if(data){ const blob = new Blob([data], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `cuzdan_${Date.now()}.json`; a.click(); URL.revokeObjectURL(blob); } }}><span style={{ fontSize: 22 }}>💾</span><span>Yedek</span></button>
      </div>
      {view !== "add" && <button className="floating-btn" onClick={openAdd}>+</button>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
