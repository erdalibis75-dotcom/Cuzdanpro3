<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cüzdan Asistanı | Gelir & Gider Takip</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0c; color: #ededee; font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif; overflow-x: hidden; }
  .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #0a0a0c; padding-bottom: 90px; }
  .glass-card { background: #121216; border: 1px solid #1f1f24; border-radius: 28px; }
  .btn { cursor: pointer; transition: all 0.1s ease; font-weight: 600; border: none; background: none; }
  .btn:active { transform: scale(0.96); opacity: 0.8; }
  .slide-up { animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; background: #1e1e24; cursor: pointer; transition: 0.1s; border: none; color: #ddd; }
  .chip-active { background: #7c3aed; color: white; }
  .tx-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 24px; background: #121216; margin-bottom: 8px; transition: 0.1s; cursor: pointer; border: 1px solid #1f1f24; }
  .tx-row:active { background: #1a1a20; }
  .floating-btn { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: #7c3aed; box-shadow: 0 6px 14px rgba(124,58,237,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 30; border: none; color: white; }
  .floating-btn:active { transform: scale(0.92); }
  .input-field { width: 100%; background: #18181c; border-radius: 24px; padding: 14px 18px; color: #f0ede8; font-size: 15px; font-weight: 500; margin-bottom: 14px; border: 1px solid #2a2a30; font-family: inherit; }
  .input-field:focus { border-color: #7c3aed; outline: none; background: #202026; }
  .input-field::placeholder { color: #5a5a66; }
  .progress-bar { height: 6px; background: #2a2a30; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  .aud-badge { display: inline-flex; align-items: center; gap: 4px; background: #0f1a22; border: 1px solid #1e4a6e; border-radius: 8px; padding: 3px 8px; font-size: 10px; font-family: monospace; color: #5bc4f5; font-weight: 700; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; }
  .modal-card { background: #121216; border-radius: 32px 32px 0 0; width: 100%; padding: 28px 22px 38px; animation: slideUp 0.25s; max-height: 80vh; overflow-y: auto; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: #0c0c10; backdrop-filter: blur(12px); border-top: 1px solid #22222a; display: flex; justify-content: space-around; padding: 8px 20px 22px; z-index: 40; }
  .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: #8e8e98; font-weight: 600; cursor: pointer; font-family: inherit; }
  .nav-active { color: #c084fc; }
  .person-avatar { width: 48px; height: 48px; border-radius: 30px; background: #2a2a32; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
  select, input { font-family: inherit; }
  button { font-family: inherit; }
  .search-box { background: #18181c; border-radius: 24px; padding: 12px 16px; color: #f0ede8; font-size: 15px; border: 1px solid #2a2a30; width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// --------------------------------------------------------------
// SAF VANİLLA JAVASCRIPT - REACT YOK, BABEL YOK, BAĞIMLILIK YOK
// --------------------------------------------------------------

// --- SABİTLER ---
const PEOPLE = ["Erdal", "A.A", "N.A"];

// Örnek veri (kategori yok, sadece not var)
const SAMPLE_TXS = [
  { id: 1, type: "income", person: "Erdal", amount: 15000, note: "Mart maaşı", date: "2026-03-01" },
  { id: 2, type: "expense", person: "Erdal", amount: 3500, note: "Kira", date: "2026-03-03" },
  { id: 3, type: "expense", person: "A.A", amount: 850, note: "Market alışverişi", date: "2026-03-05" },
  { id: 4, type: "income", person: "A.A", amount: 2200, note: "Freelance proje", date: "2026-03-07" },
  { id: 5, type: "expense", person: "N.A", amount: 320, note: "Ulaşım", date: "2026-03-08" },
  { id: 6, type: "income", person: "N.A", amount: 5000, note: "Maaş", date: "2026-03-09" },
  { id: 7, type: "expense", person: "Erdal", amount: 540, note: "Sinema + yemek", date: "2026-03-12" },
];

// Yardımcı fonksiyonlar
const formatTRY = (n) => {
  return new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n || 0);
};
const formatAUD = (n) => {
  return new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 2 }).format(n || 0);
};
const formatDateShort = (d) => {
  if (!d) return "";
  return new Date(d).toLocaleDateString("tr-TR", { day: "numeric", month: "short" });
};
const formatDateLong = (d) => {
  if (!d) return "";
  return new Date(d).toLocaleDateString("tr-TR", { day: "numeric", month: "long", year: "numeric" });
};

// State yönetimi
let txs = [];
let rate = 0.032;
let rateLoading = true;
let currentView = "home";
let selectedPerson = null;
let editTargetId = null;
let detailModalTx = null;
let filterType = "all";
let filterPerson = "all";
let searchText = "";
let monthViewKey = null;
let personTxFilter = "all";
let personSearch = "";
let formData = { type: "expense", person: "Erdal", amount: "", note: "", date: new Date().toISOString().split("T")[0] };

// DOM elementleri
let rootElement;

// Render fonksiyonu
function render() {
  if (!rootElement) return;
  rootElement.innerHTML = renderApp();
}

// Veri işlemleri
function loadData() {
  try {
    const saved = localStorage.getItem("wallet_data");
    txs = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SAMPLE_TXS));
  } catch {
    txs = JSON.parse(JSON.stringify(SAMPLE_TXS));
  }
}

function saveData() {
  localStorage.setItem("wallet_data", JSON.stringify(txs));
}

// Döviz kuru çek
async function fetchRate() {
  rateLoading = true;
  render();
  try {
    const res = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD");
    const data = await res.json();
    if (data.rates?.AUD) rate = data.rates.AUD;
  } catch (err) {
    console.warn("Kur çekilemedi");
  }
  rateLoading = false;
  render();
}

// Hesaplamalar
function getTotalIncome() {
  return txs.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
}
function getTotalExpense() {
  return txs.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
}
function getBalance() {
  return getTotalIncome() - getTotalExpense();
}
function toAUD(n) {
  return (n || 0) * rate;
}
function getPersonStats() {
  return PEOPLE.map(p => {
    const inc = txs.filter(t => t.person === p && t.type === "income").reduce((s, t) => s + t.amount, 0);
    const exp = txs.filter(t => t.person === p && t.type === "expense").reduce((s, t) => s + t.amount, 0);
    return { name: p, income: inc, expense: exp, balance: inc - exp };
  });
}
function getMonthMap() {
  const map = {};
  txs.forEach(t => {
    if (!t.date) return;
    const d = new Date(t.date);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    if (!map[key]) map[key] = { inc: 0, exp: 0, label: d.toLocaleDateString("tr-TR", { month: "long", year: "numeric" }), transactions: [] };
    map[key][t.type === "income" ? "inc" : "exp"] += t.amount;
    map[key].transactions.push(t);
  });
  return map;
}
function getFilteredHome() {
  return txs.filter(t => {
    if (filterType !== "all" && t.type !== filterType) return false;
    if (filterPerson !== "all" && t.person !== filterPerson) return false;
    if (searchText.trim() !== "" && !(t.note || "").toLowerCase().includes(searchText.toLowerCase())) return false;
    return true;
  }).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20);
}

// Aksiyonlar
function openAdd() {
  formData = { type: "expense", person: "Erdal", amount: "", note: "", date: new Date().toISOString().split("T")[0] };
  editTargetId = null;
  currentView = "add";
  render();
}
function openEdit(tx) {
  formData = { ...tx, amount: String(tx.amount) };
  editTargetId = tx.id;
  currentView = "add";
  detailModalTx = null;
  render();
}
function deleteTx(id) {
  if (confirm("Silinsin mi?")) {
    txs = txs.filter(t => t.id !== id);
    saveData();
    if (detailModalTx?.id === id) detailModalTx = null;
    render();
  }
}
function submitTx() {
  if (!formData.amount || !formData.person) return;
  const amountNum = parseFloat(formData.amount);
  if (isNaN(amountNum)) return;
  if (editTargetId) {
    txs = txs.map(t => t.id === editTargetId ? { ...formData, amount: amountNum, id: t.id } : t);
  } else {
    txs.push({ ...formData, amount: amountNum, id: Date.now() });
  }
  saveData();
  currentView = "home";
  editTargetId = null;
  render();
}
function goHome() {
  currentView = "home";
  selectedPerson = null;
  monthViewKey = null;
  filterType = "all";
  filterPerson = "all";
  searchText = "";
  detailModalTx = null;
  render();
}
function openPersonDetail(name) {
  selectedPerson = name;
  personTxFilter = "all";
  personSearch = "";
  currentView = "person";
  render();
}
function openMonthDetail(key) {
  monthViewKey = key;
  currentView = "month";
  render();
}
function exportData() {
  const data = JSON.stringify(txs, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `cuzdan_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(blob);
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        txs = imported;
        saveData();
        alert(`✅ ${imported.length} kayıt yüklendi!`);
        render();
      } else alert("❌ Geçersiz dosya!");
    } catch { alert("❌ Dosya okunamadı!"); }
  };
  reader.readAsText(file);
}

// Transaction Row HTML
function transactionRowHTML(tx) {
  return `
    <div class="tx-row" onclick="window.viewTxDetail(${tx.id})">
      <div style="display: flex; gap: 12px; align-items: center; flex: 1;">
        <div style="width: 42px; height: 42px; border-radius: 30px; background: ${tx.type === "income" ? "#0e2a1f" : "#2c1a1a"}; display: flex; align-items: center; justify-content: center; font-size: 20px;">
          ${tx.type === "income" ? "📈" : "💸"}
        </div>
        <div>
          <div style="font-weight: 700;">${escapeHtml(tx.note || (tx.type === "income" ? "Gelir" : "Harcama"))}</div>
          <div style="font-size: 11px; color: #999; display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;">
            <span>${tx.person}</span>
            <span>${formatDateShort(tx.date)}</span>
          </div>
        </div>
      </div>
      <div style="text-align: right;">
        <div style="font-weight: 800; font-family: monospace; color: ${tx.type === "income" ? "#34d399" : "#f87171"};">
          ${tx.type === "income" ? `+${formatTRY(tx.amount)}` : `-${formatTRY(tx.amount)}`}
        </div>
        <div class="aud-badge" style="font-size: 9px; margin-top: 3px;">🇦🇺 ${formatAUD(toAUD(tx.amount))}</div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === "&") return "&amp;";
    if (m === "<") return "&lt;";
    if (m === ">") return "&gt;";
    return m;
  });
}

// Global fonksiyonlar (onclick için)
window.viewTxDetail = (id) => {
  detailModalTx = txs.find(t => t.id === id);
  render();
};
window.closeModal = () => {
  detailModalTx = null;
  render();
};
window.editFromModal = (tx) => {
  openEdit(tx);
};
window.deleteFromModal = (id) => {
  deleteTx(id);
};

// Ana render fonksiyonu
function renderApp() {
  const monthMap = getMonthMap();
  const monthKeys = Object.keys(monthMap).sort().reverse();
  const personStats = getPersonStats();
  const filteredHome = getFilteredHome();
  const currentMonthData = monthViewKey ? monthMap[monthViewKey] : null;
  
  let personTxs = [];
  if (selectedPerson) {
    personTxs = txs.filter(t => t.person === selectedPerson && (personTxFilter === "all" || t.type === personTxFilter))
      .filter(t => personSearch === "" || (t.note || "").toLowerCase().includes(personSearch.toLowerCase()))
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  // Modal HTML
  let modalHTML = "";
  if (detailModalTx) {
    modalHTML = `
      <div class="modal-overlay" onclick="window.closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-weight: 800; font-size: 22px;">${detailModalTx.type === "income" ? "Gelir Detayı" : "Gider Detayı"}</div>
          <div style="font-size: 32px; font-family: monospace; font-weight: 800; margin: 10px 0; color: ${detailModalTx.type === "income" ? "#34d399" : "#f87171"};">${formatTRY(detailModalTx.amount)}</div>
          <div class="aud-badge" style="margin-bottom: 14px;">🇦🇺 ${formatAUD(toAUD(detailModalTx.amount))}</div>
          <div style="background: #1c1c24; border-radius: 24px; padding: 16px; margin-bottom: 20px;">
            <div>👤 Kişi: ${detailModalTx.person}</div>
            <div>📅 Tarih: ${formatDateLong(detailModalTx.date)}</div>
            <div>📝 Not: ${escapeHtml(detailModalTx.note) || "—"}</div>
          </div>
          <div style="display: flex; gap: 12px;">
            <button class="btn" style="flex: 1; background: #2c5f5f; padding: 12px; border-radius: 40px;" onclick="window.editFromModal(${JSON.stringify(detailModalTx).replace(/"/g, '&quot;')})">✏️ Düzenle</button>
            <button class="btn" style="flex: 1; background: #6b2e2e; padding: 12px; border-radius: 40px;" onclick="window.deleteFromModal(${detailModalTx.id})">🗑️ Sil</button>
            <button class="btn" style="background: #2c2c36; padding: 12px 18px; border-radius: 40px;" onclick="window.closeModal()">Kapat</button>
          </div>
        </div>
      </div>
    `;
  }

  // Ana içerik
  let mainContent = "";

  if (currentView === "home") {
    mainContent = `
      <div class="slide-up" style="padding: 0 18px;">
        <!-- Balance Card -->
        <div class="glass-card" style="padding: 20px; margin-bottom: 24px; background: linear-gradient(135deg, #17132a, #0f0f17);">
          <div style="font-size: 11px; font-weight: 600; color: #c4b5fd;">TOPLAM BAKİYE</div>
          <div style="font-size: 36px; font-weight: 800; font-family: monospace; color: ${getBalance() >= 0 ? "#c4b5fd" : "#ff9f8f"};">${formatTRY(getBalance())}</div>
          <div class="aud-badge" style="background: #2a1e44; margin-top: 5px;">🇦🇺 ${formatAUD(toAUD(getBalance()))}</div>
          <div style="display: flex; gap: 20px; margin-top: 16px;">
            <div><div style="font-size: 10px; color: #aaa;">GELİR</div><div style="font-weight: 800; color: #34d399;">${formatTRY(getTotalIncome())}</div><div class="aud-badge" style="margin-top: 2px;">A$ ${toAUD(getTotalIncome()).toFixed(2)}</div></div>
            <div><div style="font-size: 10px; color: #aaa;">GİDER</div><div style="font-weight: 800; color: #f87171;">${formatTRY(getTotalExpense())}</div><div class="aud-badge" style="margin-top: 2px;">A$ ${toAUD(getTotalExpense()).toFixed(2)}</div></div>
          </div>
        </div>

        <!-- Kişi Kartları -->
        <div style="margin-bottom: 20px;">
          <div style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">👥 Kişi Bazında</div>
          ${personStats.map(p => {
            const saveRate = p.income > 0 ? Math.min(100, (p.balance / p.income) * 100) : 0;
            return `
              <div class="glass-card" style="padding: 14px; margin-bottom: 10px; cursor: pointer; border-radius: 24px;" onclick="window.openPersonDetail('${p.name}')">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div><span style="font-weight: 800;">${p.name}</span><div style="font-size: 11px; color: #aaa;">tasarruf %${Math.round(saveRate)}</div></div>
                  <div style="text-align: right;"><div style="font-weight: 700;">${formatTRY(p.balance)}</div><div class="aud-badge">A$ ${toAUD(p.balance).toFixed(2)}</div></div>
                </div>
                <div class="progress-bar" style="margin-top: 8px;"><div class="progress-fill" style="width: ${saveRate}%; background: #34d399;"></div></div>
              </div>
            `;
          }).join("")}
        </div>

        <!-- Filtreler -->
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
          <select class="chip" id="filterTypeSelect" onchange="window.filterTypeChange(this.value)">
            <option value="all" ${filterType === "all" ? "selected" : ""}>📌 Tümü</option>
            <option value="income" ${filterType === "income" ? "selected" : ""}>💰 Gelir</option>
            <option value="expense" ${filterType === "expense" ? "selected" : ""}>💸 Gider</option>
          </select>
          <select class="chip" id="filterPersonSelect" onchange="window.filterPersonChange(this.value)">
            <option value="all" ${filterPerson === "all" ? "selected" : ""}>👤 Tüm kişiler</option>
            ${PEOPLE.map(p => `<option value="${p}" ${filterPerson === p ? "selected" : ""}>${p}</option>`).join("")}
          </select>
        </div>
        
        <!-- Arama -->
        <div style="margin-bottom: 16px;">
          <input type="text" class="search-box" placeholder="🔍 Not içinde ara (maaş, kira, market...)" value="${escapeHtml(searchText)}" oninput="window.searchTextChange(this.value)" />
        </div>

        <div style="font-weight: 700; margin: 6px 0 8px;">📋 Son İşlemler</div>
        ${filteredHome.map(tx => transactionRowHTML(tx)).join("")}
        ${filteredHome.length === 0 ? '<div style="text-align: center; padding: 40px; color: #555;">İşlem yok. + ile ekleyin</div>' : ""}

        <!-- Aylar -->
        <div style="margin-top: 24px; margin-bottom: 30px;">
          <div style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">📆 Aylık Özetler</div>
          <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;">
            ${monthKeys.map(key => {
              const m = monthMap[key];
              return `
                <div class="glass-card" style="padding: 10px 16px; min-width: 110px; cursor: pointer;" onclick="window.openMonthDetail('${key}')">
                  <div style="font-weight: 800; font-size: 13px;">${m.label.split(" ")[0]}</div>
                  <div style="font-size: 12px;"><span style="color: #34d399;">${formatTRY(m.inc)}</span> / <span style="color: #f87171;">${formatTRY(m.exp)}</span></div>
                  <div style="font-size: 11px; color: #aaa;">${formatTRY(m.inc - m.exp)}</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      </div>
    `;
  } 
  else if (currentView === "person" && selectedPerson) {
    const pStat = personStats.find(p => p.name === selectedPerson);
    mainContent = `
      <div class="slide-up" style="padding: 0 18px;">
        <button class="btn" onclick="window.goHome()" styl
