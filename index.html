<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c65ff">
<meta name="description" content="Kişisel gelir ve gider takip uygulaması">
<meta name="apple-mobile-web-app-title" content="Kasa Pro">
<title>Kasa Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231c65ff' width='192' height='192'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>₺</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f0f7ff; color: #334e68; padding: 10px; padding-bottom: 100px; }
    .pos { color: #2d6a4f !important; font-weight: 900; } 
    .neg { color: #ba1200 !important; font-weight: 900; } 
    .amt-navy { color: #102a43 !important; font-weight: 900; font-size: 13px; } 
    .overdue-orange { color: #f97316 !important; font-weight: 900; } 
    .card { background: #ffffff; border-radius: 20px; padding: 15px; border: 1px solid #d1e9ff; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(180, 215, 255, 0.2); text-align: center;}
    .main-total-card { border: none; background: linear-gradient(135deg, #48bbfe, #1c65ff); color: white; position: relative; }
    .main-total-card h1 { color: white !important; font-size: 32px; margin: 5px 0; }
    .back-btn { position: absolute; left: 15px; top: 15px; background: rgba(255,255,255,0.2); color: white; border: none; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
    .split-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
    .column-title { font-size: 9px; font-weight: 900; text-transform: uppercase; margin: 8px 0; color: #627d98; text-align: center; }
    .tx-row { background: #ffffff; border-radius: 14px; padding: 10px; margin-bottom: 8px; border: 1px solid #e1efff; cursor: pointer; display: flex; flex-direction: column; gap: 4px; position: relative; }
    .tx-row:active { transform: scale(0.98); }
    .input-field { width: 100%; background: #ffffff; border-radius: 14px; padding: 14px; color: #102a43; border: 2px solid #d1e9ff; margin-bottom: 10px; font-size: 14px; outline: none; font-weight: 700; }
    .btn-save { background: #1c65ff; color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 900; cursor: pointer; font-size: 14px; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; display: flex; justify-content: space-around; padding: 12px; border-top: 2px solid #d1e9ff; z-index: 1000; }
    .nav-item { text-align: center; cursor: pointer; flex: 1; }
    .nav-item div:first-child { font-size: 22px; margin-bottom: 2px; }
    .nav-item div:last-child { font-size: 9px; font-weight: 800; color: #1c65ff; text-transform: uppercase; }
    .hidden { display: none !important; }
    .manage-item { display: flex; justify-content: space-between; padding: 10px; background: #f8fbff; border-radius: 12px; margin-bottom: 5px; border: 1px solid #d1e9ff; font-size: 12px; align-items: center; }
    label { display: block; font-size: 9px; font-weight: 900; color: #1c65ff; margin-bottom: 4px; margin-left: 4px; text-transform: uppercase; text-align: left;}

    /* Inline ekleme formu */
    .inline-add-form { background: #f0f7ff; border-radius: 14px; padding: 10px; margin-bottom: 8px; border: 2px dashed #48bbfe; display: flex; gap: 6px; align-items: center; }
    .inline-add-form input { flex: 1; border: 2px solid #d1e9ff; border-radius: 10px; padding: 8px 10px; font-size: 13px; font-weight: 700; color: #102a43; outline: none; background: white; }
    .inline-add-form button { padding: 8px 12px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; font-size: 12px; }
    .btn-confirm { background: #1c65ff; color: white; }
    .btn-cancel { background: #e2e8f0; color: #627d98; }

    /* Kur güncelleme */
    .rate-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; justify-content: center; }
    .rate-input { width: 80px; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 3px 6px; font-size: 11px; font-weight: 700; color: white; background: rgba(255,255,255,0.2); text-align: center; }
    .rate-btn { background: rgba(255,255,255,0.25); color: white; border: none; border-radius: 8px; padding: 3px 8px; font-size: 11px; font-weight: 900; cursor: pointer; }

    /* Toast bildirimi */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #102a43; color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity 0.3s; }
    #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Toast bildirimi -->
<div id="toast"></div>

<!-- ANA SAYFA -->
<div id="home-view">
  <div class="card main-total-card">
    <button id="home-back-btn" class="back-btn hidden" onclick="goHome()">⬅ GERİ</button>
    <div style="font-size:10px; opacity:0.9; font-weight:900">KASA (NAKİT DURUMU)</div>
    <h1 id="global-balance">0 ₺</h1>
    <!-- Vadeli borçlar/alacaklar dahil değil; sadece kesinleşmiş işlemler -->
    <div id="global-aud" style="font-weight:800; font-size:12px; opacity:0.8">≈ 0 AUD</div>
    <div class="rate-row">
      <span style="font-size:10px; opacity:0.8;">1₺ =</span>
      <input type="number" id="rate-input" class="rate-input" step="0.0001" min="0.0001" value="0.0318">
      <span style="font-size:10px; opacity:0.8;">AUD</span>
      <button class="rate-btn" onclick="updateRate()">GÜNCELLE</button>
    </div>
  </div>

  <select id="main-person-filter" class="input-field" style="border-color: #48bbfe; margin-top:10px;" onchange="selectPerson(this.value)"></select>

  <div id="person-detail-area" class="hidden">
    <div style="display: flex; gap: 5px; margin-bottom: 8px;">
       <select id="month-filter" class="input-field" style="flex: 1; padding: 8px; font-size: 11px;" onchange="renderHome()"></select>
       <select id="cat-search-filter" class="input-field" style="flex: 1; padding: 8px; font-size: 11px;" onchange="renderHome()"></select>
    </div>
    <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 12px;">
      <input type="text" id="search-input" placeholder="Ara..." class="input-field" style="flex: 2; margin-bottom: 0;" oninput="renderHome()">
      <div style="flex: 1; background:#f0f7ff; border:2px solid #48bbfe; border-radius:12px; padding:6px; text-align:center;">
        <div style="font-size:7px; font-weight:900; color:#1c65ff;">KİŞİ NET ÖZET</div>
        <div id="search-total-val" class="amt-navy" style="font-size:11px;">0 ₺</div>
      </div>
    </div>
    <div class="split-container"><div class="column-title">ALACAKLAR (+)</div><div class="column-title">BORÇLAR (-)</div></div>
    <div class="split-container"><div id="income-column"></div><div id="expense-column"></div></div>
  </div>
</div>

<!-- YÖNETİM SAYFASI -->
<div id="settings-view" class="hidden">
  <div style="display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:15px;">
    <button onclick="smartBack()" style="position:absolute; left:0; background:none; border:none; color:#1c65ff; font-weight:900;">⬅ GERİ</button>
    <h2 style="color:#1c65ff; font-size:18px;">Yönetim Paneli</h2>
  </div>

  <!-- Kişiler -->
  <div class="card">
    <label>KİŞİLER</label>
    <div id="manage-people-list"></div>
    <div id="person-inline-form" class="inline-add-form hidden">
      <input type="text" id="person-input" placeholder="Kişi adı..." maxlength="40">
      <button class="btn-confirm" onclick="confirmAdd('person')">✓</button>
      <button class="btn-cancel" onclick="cancelAdd('person-inline-form')">✕</button>
    </div>
    <button class="btn-save" onclick="showInlineAdd('person-inline-form', 'person-input')">+ EKLE</button>
  </div>

  <!-- Alacak türleri -->
  <div class="card">
    <label>ALACAK TÜRLERİ</label>
    <div id="manage-cats-income"></div>
    <div id="income-inline-form" class="inline-add-form hidden">
      <input type="text" id="income-cat-input" placeholder="Kategori adı..." maxlength="40">
      <button class="btn-confirm" onclick="confirmAdd('category', 'income')">✓</button>
      <button class="btn-cancel" onclick="cancelAdd('income-inline-form')">✕</button>
    </div>
    <button class="btn-save" onclick="showInlineAdd('income-inline-form', 'income-cat-input')">+ EKLE</button>
  </div>

  <!-- Borç türleri -->
  <div class="card">
    <label>BORÇ TÜRLERİ</label>
    <div id="manage-cats-expense"></div>
    <div id="expense-inline-form" class="inline-add-form hidden">
      <input type="text" id="expense-cat-input" placeholder="Kategori adı..." maxlength="40">
      <button class="btn-confirm" onclick="confirmAdd('category', 'expense')">✓</button>
      <button class="btn-cancel" onclick="cancelAdd('expense-inline-form')">✕</button>
    </div>
    <button class="btn-save" onclick="showInlineAdd('expense-inline-form', 'expense-cat-input')">+ EKLE</button>
  </div>

  <!-- Veri yönetimi -->
  <div class="card" style="background: #eef7ff;">
    <label>💾 VERİ YÖNETİMİ</label>
    <div style="display:flex; gap:5px; margin-top:5px;">
      <button class="btn-save" style="background:#627d98; flex:1; font-size:11px; padding:12px;" onclick="exportJSON()">📥 YEDEKLE</button>
      <button class="btn-save" style="background:#627d98; flex:1; font-size:11px; padding:12px;" onclick="document.getElementById('import-file').click()">📤 YÜKLE</button>
    </div>
    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importJSON(event)">
  </div>
</div>

<!-- İŞLEM EKLEME SAYFASI -->
<div id="add-view" class="hidden">
  <div style="display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:15px;">
    <button onclick="smartBack()" style="position:absolute; left:0; background:none; border:none; color:#1c65ff; font-weight:900;">⬅ GERİ</button>
    <h2 style="color:#1c65ff; font-size:18px;">İşlem Kaydı</h2>
  </div>
  <label>TÜR</label>
  <select id="f-type" class="input-field" onchange="updateFormCats()">
    <option value="income">ALACAK (+)</option>
    <option value="expense">BORÇ (-)</option>
  </select>
  <label>KİŞİ</label>
  <select id="f-person" class="input-field"></select>
  <label>KATEGORİ</label>
  <select id="f-category" class="input-field">
    <option value="">— Kategori Seçiniz —</option>
  </select>
  <div style="display: flex; gap: 8px;">
    <div style="flex: 1;"><label>TARİH</label><input type="date" id="f-date" class="input-field"></div>
    <div style="flex: 1;"><label>VADE (opsiyonel)</label><input type="date" id="f-due-date" class="input-field"></div>
  </div>
  <label>TUTAR (₺)</label>
  <input type="number" id="f-amount" placeholder="0.00" class="input-field" min="0" step="0.01">
  <label>AÇIKLAMA</label>
  <input type="text" id="f-note" placeholder="Not..." class="input-field" maxlength="100">
  <button class="btn-save" id="save-btn" onclick="addTx()">KAYDET</button>
  <button id="del-btn" class="hidden" onclick="deleteCurrent()" style="width:100%; background:#fff; color:red; border:1px solid red; padding:12px; border-radius:14px; margin-top:10px; font-weight:900;">SİL</button>
</div>

<!-- ALT NAVİGASYON -->
<div class="nav-bar">
  <div class="nav-item" onclick="goHome()"><div>🏠</div><div>ANA SAYFA</div></div>
  <div class="nav-item" onclick="showAddView()"><div>➕</div><div>İŞLEM EKLE</div></div>
  <div class="nav-item" onclick="showView('settings')"><div>⚙️</div><div>YÖNETİM</div></div>
</div>

<script>
  let txs = [];
  let config = { people: [], categories: { income: [], expense: [] } };
  const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

  // AUD kuru — kullanıcı güncelleyebilir, localStorage'da saklanır
  let rate = parseFloat(localStorage.getItem('aud_rate') || '0.0318');

  let activeTab = null, editId = null;
  let viewStack = ['home'];

  // ── Veri Yükleme ──────────────────────────────────────────────
  function loadData() {
    try {
      txs = JSON.parse(localStorage.getItem('txs_sky_v2') || '[]');
      config = JSON.parse(localStorage.getItem('cfg_sky_v2') || '{"people":[],"categories":{"income":[],"expense":[]}}');
    } catch (e) {
      txs = [];
      config = { people: [], categories: { income: [], expense: [] } };
    }
  }

  function init() {
    loadData();
    document.getElementById('rate-input').value = rate;
    updateDropdowns();
    renderHome();
    renderSettings();
    registerServiceWorker();
  }

  // ── Service Worker Kaydı ──────────────────────────────────────
  function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('Service Worker kaydı başarılı:', reg);
      }).catch(err => {
        console.log('Service Worker kaydı başarısız:', err);
      });
    }
  }

  // ── Kur Güncelleme ────────────────────────────────────────────
  function updateRate() {
    const val = parseFloat(document.getElementById('rate-input').value);
    if (!val || val <= 0) { showToast('Geçerli bir kur girin!'); return; }
    rate = val;
    localStorage.setItem('aud_rate', rate);
    renderHome();
    showToast('Kur güncellendi ✓');
  }

  // ── Navigasyon ────────────────────────────────────────────────
  function smartBack() {
    if (viewStack.length > 1) {
      viewStack.pop();
      const prevView = viewStack[viewStack.length - 1];
      ['home', 'add', 'settings'].forEach(x => document.getElementById(x + '-view').classList.add('hidden'));
      document.getElementById(prevView + '-view').classList.remove('hidden');
      if (prevView === 'home') renderHome();
    } else {
      goHome();
    }
  }

  function showView(v) {
    if (viewStack[viewStack.length - 1] !== v) viewStack.push(v);
    ['home', 'add', 'settings'].forEach(x => document.getElementById(x + '-view').classList.add('hidden'));
    document.getElementById(v + '-view').classList.remove('hidden');
    if (v === 'settings') renderSettings();
  }

  function showAddView() {
    editId = null;
    resetForm();
    showView('add');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }

  function resetForm() {
    document.getElementById('f-type').value = 'income';
    updateFormCats();
    document.getElementById('f-amount').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-due-date').value = '';
    document.getElementById('del-btn').classList.add('hidden');
    document.getElementById('save-btn').innerText = 'KAYDET';
  }

  function goHome() {
    editId = null;
    activeTab = null;
    viewStack = ['home'];
    document.getElementById('main-person-filter').value = '';
    document.getElementById('del-btn').classList.add('hidden');
    document.getElementById('home-back-btn').classList.add('hidden');
    showView('home');
    renderHome();
  }

  // ── Dropdownlar ───────────────────────────────────────────────
  function updateDropdowns() {
    const mainP = document.getElementById('main-person-filter');
    const formP = document.getElementById('f-person');
    let pOpts = '<option value="">Kişi Seçiniz...</option>';
    config.people.forEach(p => pOpts += `<option value="${p}">${p}</option>`);
    mainP.innerHTML = pOpts;
    formP.innerHTML = pOpts;
    updateFormCats();
  }

  function updateFormCats() {
    const type = document.getElementById('f-type').value;
    const catSelect = document.getElementById('f-category');
    let cOpts = '<option value="">— Kategori Seçiniz —</option>';
    (config.categories[type] || []).forEach(c => cOpts += `<option value="${c}">${c}</option>`);
    catSelect.innerHTML = cOpts;
  }

  // ── Ana Sayfa Render ──────────────────────────────────────────
  function selectPerson(val) {
    activeTab = val;
    document.getElementById('home-back-btn').classList.toggle('hidden', !val);
    renderHome();
  }

  function renderHome() {
    const mFilter = document.getElementById('month-filter').value;
    const cFilter = document.getElementById('cat-search-filter').value;
    const sInput = document.getElementById('search-input').value.toLowerCase();
    const today = new Date().toISOString().split('T')[0];

    // Global bakiye: sadece vadesi geçmemiş (kesinleşmiş) işlemler dahil
    // Meta kategorisi bilgi amaçlı olduğundan hariç tutulur
    const globalBal = txs.reduce((acc, t) => {
      if (t.dueDate || t.category === 'Meta') return acc;
      return t.type === 'income' ? acc + t.amount : acc - t.amount;
    }, 0);
    document.getElementById('global-balance').innerText = globalBal.toLocaleString('tr-TR') + ' ₺';
    document.getElementById('global-aud').innerText = '≈ ' + (globalBal * rate).toFixed(2) + ' AUD';

    if (activeTab) {
      document.getElementById('person-detail-area').classList.remove('hidden');
      const pData = txs.filter(t => t.person === activeTab);

      // Ay filtresi
      let mOpts = '<option value="Hepsi">Tüm Zamanlar</option>';
      const uniqueMonths = [...new Set(pData.map(t => {
        const d = new Date(t.date);
        return `${months[d.getMonth()]} ${d.getFullYear()}`;
      }))];
      uniqueMonths.sort((a, b) => b.localeCompare(a));
      uniqueMonths.forEach(m => mOpts += `<option value="${m}" ${m === mFilter ? 'selected' : ''}>${m}</option>`);
      document.getElementById('month-filter').innerHTML = mOpts;

      // Kategori filtresi
      let cOpts = '<option value="all">Tümü</option>';
      [...new Set(pData.map(t => t.category))].filter(Boolean).forEach(c =>
        cOpts += `<option value="${c}" ${c === cFilter ? 'selected' : ''}>${c}</option>`
      );
      document.getElementById('cat-search-filter').innerHTML = cOpts;

      // Filtrele
      const pFiltered = pData.filter(t => {
        const d = new Date(t.date);
        const mStr = `${months[d.getMonth()]} ${d.getFullYear()}`;
        return (
          (mFilter === 'Hepsi' || mFilter === '' || mStr === mFilter) &&
          (cFilter === 'all' || cFilter === '' || t.category === cFilter) &&
          (t.note || '').toLowerCase().includes(sInput)
        );
      });

      // Kişi net özeti: vadeli borçlar hariç, vadeli alacaklar da hariç (simetrik)
      const personNet = pFiltered.reduce((acc, t) => {
        if (t.dueDate) return acc; // vadeli işlemler net özete dahil değil
        return t.type === 'income' ? acc + t.amount : acc - t.amount;
      }, 0);
      document.getElementById('search-total-val').innerText = personNet.toLocaleString('tr-TR') + ' ₺';

      const incCol = document.getElementById('income-column');
      const expCol = document.getElementById('expense-column');
      incCol.innerHTML = '';
      expCol.innerHTML = '';

      pFiltered.forEach(t => {
        const isWaiting = !!t.dueDate;
        const isOverdue = isWaiting && t.dueDate <= today;
        let colorClass = t.type === 'income' ? 'pos' : 'neg';
        if (isOverdue) colorClass = 'overdue-orange';
        const metaStyle = t.category === 'Meta' ? 'border-left: 4px solid #7c3aed;' : '';
        const catLabel = t.category || '—';

        const html = `<div class="tx-row" onclick="prepareEdit(${t.id})" style="${metaStyle}">
          <b class="${colorClass}">${t.note || 'İsimsiz'}</b>
          <small>${catLabel} • ${t.date}</small>
          ${isWaiting ? `<small class="${isOverdue ? 'overdue-orange' : 'amt-navy'}">📅 Vade: ${t.dueDate}</small>` : ''}
          <div class="${isOverdue ? 'overdue-orange' : 'amt-navy'}"><b>${(t.type === 'income' ? '' : '-') + t.amount.toLocaleString('tr-TR')}₺</b></div>
        </div>`;
        t.type === 'income' ? incCol.innerHTML += html : expCol.innerHTML += html;
      });

    } else {
      document.getElementById('person-detail-area').classList.add('hidden');
    }
  }

  // ── İşlem Ekleme / Güncelleme ─────────────────────────────────
  function addTx() {
    const amt = parseFloat(document.getElementById('f-amount').value);
    const pers = document.getElementById('f-person').value;
    if (!amt || amt <= 0) { showToast('Geçerli bir tutar girin!'); return; }
    if (!pers) { showToast('Kişi seçmek zorunlu!'); return; }

    const data = {
      id: editId || Date.now(),
      type: document.getElementById('f-type').value,
      person: pers,
      category: document.getElementById('f-category').value || '',
      date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
      dueDate: document.getElementById('f-due-date').value || '',
      amount: amt,
      note: document.getElementById('f-note').value.trim()
    };

    if (editId) {
      txs = txs.map(t => t.id === editId ? data : t);
      showToast('İşlem güncellendi ✓');
    } else {
      txs.unshift(data);
      showToast('İşlem eklendi ✓');
    }
    saveAll();
    goHome();
  }

  function prepareEdit(id) {
    const t = txs.find(x => x.id === id);
    if (!t) return;
    editId = id;
    showView('add');
    document.getElementById('f-type').value = t.type;
    updateFormCats();
    document.getElementById('f-person').value = t.person;
    document.getElementById('f-category').value = t.category || '';
    document.getElementById('f-date').value = t.date;
    document.getElementById('f-due-date').value = t.dueDate || '';
    document.getElementById('f-amount').value = t.amount;
    document.getElementById('f-note').value = t.note || '';
    document.getElementById('del-btn').classList.remove('hidden');
    document.getElementById('save-btn').innerText = 'GÜNCELLE';
  }

  function deleteCurrent() {
    if (confirm('Bu işlem silinsin mi? Bu işlem geri alınamaz.')) {
      txs = txs.filter(t => t.id !== editId);
      saveAll();
      showToast('İşlem silindi');
      goHome();
    }
  }

  // ── Yönetim Paneli ────────────────────────────────────────────
  function renderSettings() {
    const pList = document.getElementById('manage-people-list');
    pList.innerHTML = '';
    config.people.forEach((p, i) =>
      pList.innerHTML += `<div class="manage-item"><span>${p}</span><button style="color:red;border:none;background:none;font-weight:900" onclick="removeItem('person',${i})">SİL</button></div>`
    );

    ['income', 'expense'].forEach(type => {
      const cList = document.getElementById('manage-cats-' + type);
      cList.innerHTML = '';
      (config.categories[type] || []).forEach((c, i) =>
        cList.innerHTML += `<div class="manage-item"><span>${c}</span><button style="color:red;border:none;background:none;font-weight:900" onclick="removeItem('category',${i},'${type}')">SİL</button></div>`
      );
    });
  }

  // İnline ekleme formu göster
  function showInlineAdd(formId, inputId) {
    document.getElementById(formId).classList.remove('hidden');
    document.getElementById(inputId).focus();
  }

  function cancelAdd(formId) {
    document.getElementById(formId).classList.add('hidden');
    // içindeki input'u temizle
    document.querySelector('#' + formId + ' input').value = '';
  }

  function confirmAdd(type, catType) {
    let inputId, formId;
    if (type === 'person') { inputId = 'person-input'; formId = 'person-inline-form'; }
    else if (catType === 'income') { inputId = 'income-cat-input'; formId = 'income-inline-form'; }
    else { inputId = 'expense-cat-input'; formId = 'expense-inline-form'; }

    const name = document.getElementById(inputId).value.trim();
    if (!name) { showToast('Ad boş bırakılamaz!'); return; }

    if (type === 'person') {
      if (config.people.includes(name)) { showToast('Bu kişi zaten mevcut!'); return; }
      config.people.push(name);
    } else {
      if (config.categories[catType].includes(name)) { showToast('Bu kategori zaten mevcut!'); return; }
      config.categories[catType].push(name);
    }

    cancelAdd(formId);
    saveCfg();
    showToast('Eklendi ✓');
  }

  function removeItem(type, index, catType) {
    if (confirm('Silinsin mi?')) {
      if (type === 'person') config.people.splice(index, 1);
      else config.categories[catType].splice(index, 1);
      saveCfg();
      showToast('Silindi');
    }
  }

  // ── Kaydetme ──────────────────────────────────────────────────
  function saveCfg() {
    localStorage.setItem('cfg_sky_v2', JSON.stringify(config));
    updateDropdowns();
    renderSettings();
    renderHome();
  }

  function saveAll() {
    localStorage.setItem('txs_sky_v2', JSON.stringify(txs));
    renderHome();
  }

  // ── JSON Yedek / Yükle ────────────────────────────────────────
  function exportJSON() {
    const data = { txs, config };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().split('T')[0];
    a.href = URL.createObjectURL(blob);
    a.download = `kasa_yedek_${dateStr}.json`;
    a.click();
    showToast('Yedek indirildi ✓');
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.json')) { showToast('Lütfen .json dosyası seçin!'); return; }

    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (data && data.txs && data.config) {
          if (confirm('Dikkat: Mevcut verileriniz silinecek ve yedek yüklenecek. Onaylıyor musunuz?')) {
            localStorage.setItem('txs_sky_v2', JSON.stringify(data.txs));
            localStorage.setItem('cfg_sky_v2', JSON.stringify(data.config));
            showToast('Veriler yüklendi, yenileniyor...');
            setTimeout(() => window.location.reload(), 1000);
          }
        } else {
          showToast('Hata: Geçersiz yedek dosyası!');
        }
      } catch (err) {
        showToast('Dosya okunurken hata oluştu!');
      }
    };
    reader.onerror = () => showToast('Dosya erişim hatası!');
    reader.readAsText(file);
    // Input'u sıfırla (aynı dosya tekrar seçilebilsin)
    e.target.value = '';
  }

  // ── Toast Bildirimi ───────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Başlat ────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
